<style>

*{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--f);background:var(--bg);color:var(--t);min-height:100vh}::selection{background:var(--acc);color:#fff}::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:9px}

.logo{display:flex;align-items:center;gap:10px;margin-right:32px}.lm{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#C8590A,#E8850A);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff;box-shadow:0 2px 8px rgba(200,89,10,.25)}.lt2{font-weight:800;font-size:17px}.ls{font-size:10px;color:var(--t3);font-weight:600;letter-spacing:.5px;text-transform:uppercase}

.fl{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.sbox{position:relative}.sbox svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--t3);width:15px;height:15px}.sbox input{padding:8px 12px 8px 34px;background:var(--card);border:1px solid var(--bdr);border-radius:10px;font-family:var(--f);font-size:13px;color:var(--t);outline:none;width:190px}.sbox input:focus{border-color:var(--acc)}

.fd{margin-bottom:14px}.fd label{display:block;font-size:12px;color:var(--t3);font-weight:600;margin-bottom:5px}.fd input,.fd select{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--bdr);border-radius:10px;font-family:var(--f);font-size:14px;color:var(--t);outline:none}.fd input:focus,.fd select:focus{border-color:var(--acc)}.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.loading{display:flex;align-items:center;justify-content:center;padding:60px;flex-direction:column;gap:16px}.spinner{width:36px;height:36px;border:3px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}

<body>

<script>
var loans=[],contributions=[],investments=[],settings={},creditScores={},currentPage='dashboard',searchTerm='',statusFilter='ALL';
var fmt=function(n){return n==null||isNaN(n)?'—':new Intl.NumberFormat('en-TZ').format(Math.round(n))};
var fmtS=function(n){return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(0)+'K':fmt(n)};
var today=new Date();today.setHours(0,0,0,0);
var isOD=function(l){return l.status&&l.status.toUpperCase().trim()!=='PAID'&&l.dueDate&&new Date(l.dueDate)<today};
var dOD=function(l){return isOD(l)?Math.floor((today-new Date(l.dueDate))/864e5):0};
var esc=function(s){return String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')};
var IC={dash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>',loan:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>',ppl:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4-4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>',alt:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',bulb:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18h6M10 22h4M12 2a7 7 0 00-4 12.7V17h8v-2.3A7 7 0 0012 2z"/></svg>',gear:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>',plus:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',edit:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',trash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>',chk:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>',x:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',srch:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>',pls:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>',mail:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12a2 2 0 01-2 2H4a2 2 0 01-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>',shield:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',file:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'};

function donut(segs,sz,sw){sz=sz||130;sw=sw||15;var r=(sz-sw)/2,c=2*Math.PI*r,tot=0,off=0,a='';segs.forEach(function(s){tot+=s.v});segs.forEach(function(s){if(s.v<=0)return;var p=s.v/(tot||1),d=p*c;a+='<circle cx="'+sz/2+'" cy="'+sz/2+'" r="'+r+'" fill="none" stroke="'+s.c+'" stroke-width="'+sw+'" stroke-dasharray="'+d+' '+(c-d)+'" stroke-dashoffset="'+(-off)+'" stroke-linecap="round" transform="rotate(-90 '+sz/2+' '+sz/2+')"/>';off+=d});return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 '+sz+' '+sz+'"><circle cx="'+sz/2+'" cy="'+sz/2+'" r="'+r+'" fill="none" stroke="var(--bdr)" stroke-width="'+sw+'"/>'+a+'<text x="'+sz/2+'" y="'+(sz/2-5)+'" text-anchor="middle" fill="var(--t)" style="font-size:19px;font-weight:800;font-family:var(--f)">'+fmtS(tot)+'</text><text x="'+sz/2+'" y="'+(sz/2+13)+'" text-anchor="middle" fill="var(--t3)" style="font-size:10px;font-weight:600">TSH</text></svg>'}

function toast(m,t){var e=document.getElementById('toast');e.className='toast t'+(t||'ok')+' show';e.textContent=m;setTimeout(function(){e.classList.remove('show')},3500)}
function R(h){document.getElementById('M').innerHTML=h}

// ═══ google.script.run WRAPPER — no CORS ever ═══
function gsr(fnName, arg) {
  return new Promise(function(resolve, reject) {
    var runner = google.script.run.withSuccessHandler(resolve).withFailureHandler(function(err){toast(err.message||'Server error','er');reject(err)});
    if (arg !== undefined) runner[fnName](arg);
    else runner[fnName]();
  });
}

function loadAll() {
  R('<div class="loading"><div class="spinner"></div><span style="color:var(--t3)">Loading data...</span></div>');
  gsr('getAllData').then(function(d) {
    loans=d.loans||[]; contributions=d.contributions||[]; investments=d.investments||[];
    settings=d.settings||{}; creditScores=d.creditScores||{};
    renderAll();
  });
}

// ═══ STATS ═══
function getStats(){var op=loans.filter(function(l){return(l.status||'').toUpperCase().trim()!=='PAID'}),pd=loans.filter(function(l){return(l.status||'').toUpperCase().trim()==='PAID'}),tSTP=loans.reduce(function(s,l){return s+(+l.sumToPay||0)},0),tR2=loans.reduce(function(s,l){return s+(+l.amountPaid||0)},0);return{tL:loans.reduce(function(s,l){return s+(+l.amount||0)},0),tO:op.reduce(function(s,l){return s+(+l.remaining||0)},0),tR:tR2,tI:pd.reduce(function(s,l){return s+(+l.interest||0)},0),od:op.filter(isOD),odA:op.filter(isOD).reduce(function(s,l){return s+(+l.remaining||0)},0),tC:contributions.reduce(function(s,c){return s+(+c.total||0)},0),iT:investments.reduce(function(s,i){return s+(+i.amount||0)},0),rR:tSTP>0?(tR2/tSTP*100):0,oC:op.length,pC:pd.length}}
function getBStats(){var m={};loans.forEach(function(l){var b=l.borrower;if(!b)return;if(!m[b])m[b]={n:b,tB:0,tO:0,tP:0,cnt:0,odC:0};m[b].tB+=(+l.amount||0);m[b].tO+=(+l.remaining||0);m[b].tP+=(+l.amountPaid||0);m[b].cnt++;if(isOD(l))m[b].odC++});return Object.values(m).sort(function(a,b){return b.tO-a.tO})}

// ═══ NAV ═══
var pages=[{id:'dashboard',l:'Dashboard',i:IC.dash},{id:'loans',l:'Loans',i:IC.loan},{id:'contributions',l:'Contributions',i:IC.ppl},{id:'alerts',l:'Alerts',i:IC.alt},{id:'insights',l:'Insights',i:IC.bulb},{id:'settings',l:'Settings',i:IC.gear}];
function renderNav(){document.getElementById('mainNav').innerHTML=pages.map(function(p){return '<button class="nb '+(currentPage===p.id?'ac':'')+'" onclick="goPage(\''+p.id+'\')">'+p.i+'<span>'+p.l+'</span></button>'}).join('');var s=getStats(),ob=document.getElementById('odBtn');if(s.od.length>0){ob.style.display='flex';document.getElementById('odCnt').textContent=s.od.length+' Overdue'}else{ob.style.display='none'}}
function goPage(id){currentPage=id;renderNav();renderPage()}
function renderPage(){({dashboard:rDash,loans:rLoans,contributions:rContrib,alerts:rAlerts,insights:rInsights,settings:rSettings})[currentPage]()}

eturn '<div class="upc"><div><span style="font-weight:700">'+esc(l.borrower)+'</span><span style="color:var(--t3);font-size:12px;margin-left:12px">Due: '+l.dueDate+'</span></div><span style="font-weight:800;color:var(--acc)">'+fmt(l.remaining)+' TSH</span></div>'}).join('')+'</div>'))}

function rInsights(){var bs=getBStats(),maxExp=+(settings.maxExposurePerBorrower||3000000),tI=loans.filter(function(l){return(l.status||'').toUpperCase().trim()==='PAID'}).reduce(function(s,l){return s+(+l.interest||0)},0),tL=loans.reduce(function(s,l){return s+(+l.amount||0)},0),avgR=loans.length>0?loans.reduce(function(s,l){return s+(+l.rate||0)},0)/loans.length:10,proj=[];var bal=tL;for(var m=1;m<=12;m++){bal=bal*(1+avgR/100/12)+400000;proj.push({m:m,b:bal})}

-Month Growth</div><p style="font-size:13px;color:var(--t2);margin-bottom:16px">'+avgR.toFixed(1)+'% avg rate + 400K TSH/mo contributions</p><div style="display:flex;align-items:flex-end;gap:6px;height:120px">'+proj.map(function(p){var h=Math.max(4,(p.b/proj[11].b)*100);return '<div style="flex:1;display:flex;flex-direction:column;align-items:center"><div style="font-size:9px;color:var(--t3);margin-bottom:3px;font-weight:600">'+fmtS(p.b)+'</div><div style="width:100%;max-width:32px;height:'+h+'px;background:linear-gradient(180deg,var(--grn),var(--blu));border-radius:4px 4px 0 0"></div><div style="font-size:9px;color:var(--t3);margin-top:4px">M'+p.m+'</div></div>'}).join('')+'</div><div style="margin-top:16px;padding:14px;background:var(--bg);border-radius:10px;font-size:13px;display:flex;gap:24px;flex-wrap:wrap"><span>Fund: <b>'+fmtS(tL)+'</b></span><span>Interest: <b style="color:var(--grn)">'+fmtS(tI)+'</b></span><span>12mo: <b style="color:var(--blu)">'+fmtS(proj[11].b)+'</b></span></div></div>')}

function openLoanModal(){var td=new Date().toISOString().split('T')[0];openModal('<div class="mh"><h3>New Loan</h3><button class="mc" onclick="closeModal()">'+IC.x+'</button></div><div class="warn"><b>Due date required</b> — enables overdue tracking &amp; email reminders.</div><div class="fd"><label>Borrower *</label><input id="f_b" placeholder="e.g., Emanuel Chaula" oninput="chkExp()"></div><div class="fd"><label>Borrower Email</label><input id="f_em" type="email" placeholder="For direct reminders"></div><div class="fr"><div class="fd"><label>Loan Date</label><input id="f_ld" type="date" value="'+td+'"></div><div class="fd"><label>Due Date *</label><input id="f_dd" type="date"></div></div><div class="fr"><div class="fd"><label>Amount (TSH) *</label><input id="f_a" type="number" placeholder="0" oninput="calcP();chkExp()"></div><div class="fd"><label>Rate (%)</label><input id="f_r" type="number" value="10" oninput="calcP()"></div></div><div class="fd"><label>Already Paid</label><input id="f_p" type="number" value="0"></div><div class="fd"><label>Notes</label><input id="f_n" placeholder="Optional..."></div><div id="expW"></div><div class="cp" id="cP"></div><div class="ma"><button class="btn bgh" onclick="closeModal()">Cancel</button><button class="btn bp" onclick="saveLoan()">Create Loan</button></div>');calcP()}

function openEditLoan(id){var l;loans.forEach(function(x){if(String(x.id)===String(id))l=x});if(!l)return;var st=(l.status||'').toUpperCase().trim();openModal('<div class="mh"><h3>Edit Loan</h3><button class="mc" onclick="closeModal()">'+IC.x+'</button></div><input type="hidden" id="f_eid" value="'+l.id+'"><div class="fd"><label>Borrower</label><input id="f_b" value="'+esc(l.borrower)+'"></div><div class="fd"><label>Email</label><input id="f_em" type="email" value="'+esc(l.email||'')+'"></div><div class="fr"><div class="fd"><label>Loan Date</label><input id="f_ld" type="date" value="'+(l.loanDate||'')+'"></div><div class="fd"><label>Due Date</label><input id="f_dd" type="date" value="'+(l.dueDate||'')+'"></div></div><div class="fr"><div class="fd"><label>Amount</label><input id="f_a" type="number" value="'+l.amount+'" oninput="calcP()"></div><div class="fd"><label>Rate (%)</label><input id="f_r" type="number" value="'+l.rate+'" oninput="calcP()"></div></div><div class="fd"><label>Paid</label><input id="f_p" type="number" value="'+l.amountPaid+'"></div><div class="fd"><label>Status</label><select id="f_st"><option '+(st==='OPEN'?'selected':'')+'>OPEN</option><option '+(st==='PAID'?'selected':'')+'>PAID</option></select></div><div class="fd"><label>Notes</label><input id="f_n" value="'+esc(l.notes||'')+'"></div><div class="cp" id="cP"></div><div class="ma"><button class="btn bgh" onclick="closeModal()">Cancel</button><button class="btn bp" onclick="saveLoan(true)">Update</button></div>');calcP()}

function calcP(){var a=+((document.getElementById('f_a')||{}).value)||0,r=+((document.getElementById('f_r')||{}).value)||0,el=document.getElementById('cP');if(el)el.innerHTML='<div class="cr2"><span style="color:var(--t3)">Interest:</span><span style="color:var(--acc);font-weight:600">'+fmt(a*r/100)+' TSH</span></div><div class="cr2"><span style="color:var(--t3)">Total:</span><span style="font-weight:700">'+fmt(a*(1+r/100))+' TSH</span></div>'}
function chkExp(){var b=((document.getElementById('f_b')||{}).value||'').trim(),a=+((document.getElementById('f_a')||{}).value)||0,mx=+(settings.maxExposurePerBorrower||3000000),el=document.getElementById('expW');if(!el||!b||!a){if(el)el.innerHTML='';return}var cur=0;loans.forEach(function(l){if(l.borrower===b&&(l.status||'').toUpperCase().trim()!=='PAID')cur+=(+l.remaining||0)});var nt=cur+a;if(nt>mx)el.innerHTML='<div class="warn" style="background:#FEF2F2;border-color:var(--red);color:#7F1D1D"><b>Exposure limit exceeded!</b> '+esc(b)+': '+fmt(nt)+' TSH (limit: '+fmt(mx)+')</div>';else if(nt/mx>.6)el.innerHTML='<div class="warn">Exposure at '+(nt/mx*100).toFixed(0)+'% for '+esc(b)+'</div>';else el.innerHTML=''}

function saveLoan(isEdit){var b=document.getElementById('f_b').value.trim();if(!b){toast('Enter name','wa');return}var dd=document.getElementById('f_dd').value;if(!dd&&!isEdit){toast('Due date required','wa');return}var d={borrower:b,email:(document.getElementById('f_em')||{}).value||'',loanDate:document.getElementById('f_ld').value,dueDate:dd,amount:+(document.getElementById('f_a').value)||0,rate:+(document.getElementById('f_r').value)||0,amountPaid:+(document.getElementById('f_p').value)||0,notes:document.getElementById('f_n').value,status:(document.getElementById('f_st')||{}).value||'OPEN'};if(isEdit){d.id=document.getElementById('f_eid').value;gsr('updateLoan',d).then(function(r){if(r&&r.success){toast('Updated');closeModal();loadAll()}})}else{gsr('createLoan',d).then(function(r){if(r&&r.success){toast('Created!');closeModal();loadAll()}})}}

function openPayModal(id){var l;loans.forEach(function(x){if(String(x.id)===String(id))l=x});if(!l)return;openModal('<div class="mh"><h3>Record Payment</h3><button class="mc" onclick="closeModal()">'+IC.x+'</button></div><input type="hidden" id="f_pid" value="'+l.id+'"><div class="cp"><p style="font-weight:700;font-size:15px;margin-bottom:10px">'+esc(l.borrower)+'</p><div class="cr2"><span style="color:var(--t3)">Owed:</span><span style="font-weight:600">'+fmt(l.sumToPay)+' TSH</span></div><div class="cr2"><span style="color:var(--t3)">Paid:</span><span style="color:var(--grn);font-weight:600">'+fmt(l.amountPaid)+' TSH</span></div><div class="cr2"><span style="color:var(--t3)">Remaining:</span><span style="color:var(--acc);font-weight:700">'+fmt(l.remaining)+' TSH</span></div></div><div class="fd"><label>Payment Amount (TSH)</label><input id="f_pa" type="number" placeholder="Enter amount..."></div><div class="ma"><button class="btn bgh bsm" onclick="document.getElementById(\'f_pa\').value=\''+l.remaining+'\'">Pay Full</button><button class="btn bs2" onclick="recPay()">'+IC.chk+' Record</button></div>')}
function recPay(){var id=document.getElementById('f_pid').value,a=+(document.getElementById('f_pa').value)||0;if(a<=0){toast('Enter amount','wa');return}gsr('doRecordPayment',{id:id,amount:a}).then(function(r){if(r&&r.success){toast(r.status==='PAID'?'FULLY PAID!':'Recorded');closeModal();loadAll()}})}

function confirmDel(id){var l;loans.forEach(function(x){if(String(x.id)===String(id))l=x});if(!l)return;openModal('<div class="mh"><h3>Delete Loan</h3><button class="mc" onclick="closeModal()">'+IC.x+'</button></div><p style="color:var(--t2);font-size:14px;margin-bottom:20px">Delete <b>'+esc(l.borrower)+'</b> loan of <b>'+fmt(l.amount)+' TSH</b>?</p><div class="ma"><button class="btn bgh" onclick="closeModal()">Cancel</button><button class="btn bd" onclick="doDelete(\''+id+'\')">'+IC.trash+' Delete</button></div>')}
function doDelete(id){gsr('deleteLoan',id).then(function(r){if(r&&r.success){toast('Deleted');closeModal();loadAll()}})}

function openContribModal(){openModal('<div class="mh"><h3>Add Contribution</h3><button class="mc" onclick="closeModal()">'+IC.x+'</button></div><div class="fd"><label>Month</label><input id="f_cM" placeholder="e.g., April 2026"></div><div class="fr"><div class="fd"><label>Redempter</label><input id="f_cR" type="number" value="220796"></div><div class="fd"><label>TC</label><input id="f_cT" type="number" value="179204"></div></div><div class="fd"><label>Date</label><input id="f_cD" type="date"></div><div class="fd"><label>Txn ID</label><input id="f_cTx" placeholder="CRDB ref"></div><div class="ma"><button class="btn bgh" onclick="closeModal()">Cancel</button><button class="btn bp" onclick="saveC()">Add</button></div>')}
function openEditContrib(id){var c;contributions.forEach(function(x){if(String(x.id)===String(id))c=x});if(!c)return;openModal('<div class="mh"><h3>Edit Contribution</h3><button class="mc" onclick="closeModal()">'+IC.x+'</button></div><input type="hidden" id="f_cE" value="'+c.id+'"><div class="fd"><label>Month</label><input id="f_cM" value="'+esc(c.month)+'"></div><div class="fr"><div class="fd"><label>Redempter</label><input id="f_cR" type="number" value="'+c.redempter+'"></div><div class="fd"><label>TC</label><input id="f_cT" type="number" value="'+c.tc+'"></div></div><div class="fd"><label>Date</label><input id="f_cD" type="date" value="'+(c.date||'')+'"></div><div class="fd"><label>Txn ID</label><input id="f_cTx" value="'+esc(c.txnId||'')+'"></div><div class="fd"><label>Status</label><select id="f_cS"><option '+(c.status==='PAID'?'selected':'')+'>PAID</option><option '+(c.status==='PENDING'?'selected':'')+'>PENDING</option></select></div><div class="ma"><button class="btn bgh" onclick="closeModal()">Cancel</button><button class="btn bp" onclick="saveC(true)">Update</button></div>')}
function saveC(isEdit){var d={month:document.getElementById('f_cM').value,redempter:+(document.getElementById('f_cR').value)||0,tc:+(document.getElementById('f_cT').value)||0,date:document.getElementById('f_cD').value,txnId:document.getElementById('f_cTx').value,status:(document.getElementById('f_cS')||{}).value||'PAID'};if(isEdit){d.id=document.getElementById('f_cE').value;gsr('updateContribution',d).then(function(r){if(r&&r.success){toast('Updated');closeModal();loadAll()}})}else{gsr('createContribution',d).then(function(r){if(r&&r.success){toast('Added');closeModal();loadAll()}})}}

// ═══ INIT ═══
loadAll();
</script>
</body>
