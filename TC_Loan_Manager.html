<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TC Loan Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--bg:#F6F5F0;--bg2:#EEECE6;--card:#FFFFFF;--card-hover:#FAFAF8;--border:#E2E0D8;--blt:#EEECEA;--accent:#C8590A;--adim:rgba(200,89,10,.08);--ahov:#A94A08;--green:#1A7A4C;--gdim:rgba(26,122,76,.08);--red:#C23B22;--rdim:rgba(194,59,34,.07);--blue:#2563EB;--bdim:rgba(37,99,235,.07);--purple:#7C3AED;--pdim:rgba(124,58,237,.07);--t:#1A1A18;--t2:#5C5B56;--t3:#8E8D88;--sh:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.03);--shl:0 8px 32px rgba(0,0,0,.08);--r:14px;--rs:10px;--f:'Plus Jakarta Sans',-apple-system,sans-serif;--mono:'JetBrains Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--f);background:var(--bg);color:var(--t);min-height:100vh}::selection{background:var(--accent);color:#fff}::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:9px}
#app{display:flex;flex-direction:column;min-height:100vh}
.hdr{background:var(--card);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;height:62px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px;margin-right:32px}.lm{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#C8590A,#E8850A);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff;letter-spacing:-.5px;box-shadow:0 2px 8px rgba(200,89,10,.25)}.lt2{font-weight:800;font-size:17px;letter-spacing:-.4px}.ls{font-size:10px;color:var(--t3);font-weight:600;letter-spacing:.5px;text-transform:uppercase}
nav{display:flex;gap:2px;flex:1}.nb{background:none;border:none;padding:10px 16px;border-radius:10px;font-family:var(--f);font-size:13px;font-weight:600;cursor:pointer;color:var(--t3);display:flex;align-items:center;gap:7px;transition:all .15s}.nb:hover{color:var(--t2);background:var(--bg2)}.nb.a{color:var(--accent);background:var(--adim)}.nb svg{width:18px;height:18px}
.odb{background:var(--rdim);color:var(--red);padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:var(--f);display:none;align-items:center;gap:5px;animation:pulse 2.5s ease infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.65}}
main{flex:1;padding:28px;max-width:1240px;width:100%;margin:0 auto}
.ph{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap;gap:12px}.ph h1{font-size:26px;font-weight:800;letter-spacing:-.6px}.ph p{font-size:13px;color:var(--t3);margin-top:3px}
.sr{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:24px}.sc{flex:1 1 200px;min-width:180px;background:var(--card);border:1px solid var(--blt);border-radius:var(--r);padding:20px 22px;position:relative;overflow:hidden;box-shadow:var(--sh);transition:transform .15s,box-shadow .2s}.sc:hover{transform:translateY(-2px);box-shadow:var(--shl)}.sc .ic{position:absolute;top:16px;right:18px;opacity:.1}.sc .lb{font-size:11px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.9px;margin-bottom:8px}.sc .vl{font-size:28px;font-weight:800;letter-spacing:-.5px;font-feature-settings:'tnum'}.sc .sb{font-size:12px;font-weight:600;margin-top:4px}
.cd{background:var(--card);border:1px solid var(--blt);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}.ct{font-size:12px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:13px}thead tr{border-bottom:2px solid var(--border)}th{padding:12px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;white-space:nowrap;background:var(--card)}td{padding:13px 14px;border-bottom:1px solid var(--blt)}tr.rh:hover{background:var(--card-hover)}tr.odr{background:var(--rdim)}
.cn{font-weight:700}.cno{font-size:10px;color:var(--t3);margin-top:2px}.cm{font-feature-settings:'tnum';font-weight:600}.cg{color:var(--green)}.ca{color:var(--accent)}.cr{color:var(--red)}.cmu{color:var(--t3)}.cmo{font-family:var(--mono);font-size:11px;color:var(--t3)}.lt3{font-size:10px;color:var(--red);font-weight:600}
.tf{padding:12px 16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:12px;color:var(--t3)}
.bg{display:inline-block;padding:3px 11px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.4px;white-space:nowrap}.bgp{background:var(--gdim);color:var(--green)}.bgo{background:var(--adim);color:var(--accent)}.bgod{background:var(--rdim);color:var(--red)}.bgpe{background:var(--bg2);color:var(--t3)}.bga{background:var(--gdim);color:var(--green)}.bgb{background:var(--bdim);color:var(--blue)}.bgc{background:var(--adim);color:var(--accent)}.bgd{background:var(--rdim);color:var(--red)}
.btn{border:none;border-radius:10px;font-family:var(--f);font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .12s;font-size:13px;padding:10px 20px}.btn:active{transform:scale(.97)}.bp{background:var(--accent);color:#fff}.bp:hover{background:var(--ahov)}.bs{background:var(--green);color:#fff}.bd{background:var(--red);color:#fff}.bgh{background:transparent;color:var(--t2);border:1px solid var(--border)}.bgh:hover{background:var(--bg2)}.bsm{padding:6px 12px;font-size:12px;border-radius:8px}
.ab{border:none;border-radius:7px;padding:6px 9px;cursor:pointer;display:inline-flex;align-items:center;transition:all .12s}.ab:hover{transform:scale(1.08)}.ab svg{width:15px;height:15px}.ap{background:var(--gdim);color:var(--green)}.ae{background:var(--bdim);color:var(--blue)}.adl{background:var(--rdim);color:var(--red)}
.fl{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.sbox{position:relative}.sbox svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--t3);width:15px;height:15px}.sbox input{padding:8px 12px 8px 34px;background:var(--card);border:1px solid var(--border);border-radius:10px;font-family:var(--f);font-size:13px;color:var(--t);outline:none;width:190px}.sbox input:focus{border-color:var(--accent)}
.fb{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--f);border:1px solid var(--border);background:transparent;color:var(--t3)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}@media(max-width:780px){.g2{grid-template-columns:1fr}}
.dw{display:flex;gap:22px;align-items:center}.dl{flex:1}.dlr{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--blt)}.dld{width:9px;height:9px;border-radius:5px;flex-shrink:0}.dll{font-size:13px;font-weight:500;color:var(--t2);display:flex;align-items:center;gap:8px}.dlv{font-size:13px;font-weight:700;font-feature-settings:'tnum'}
.mb{display:flex;align-items:flex-end;gap:4px;height:54px}.mbc{display:flex;flex-direction:column;align-items:center;flex:1}.mbb{width:100%;min-width:8px;max-width:24px;border-radius:3px 3px 0 0}.mbl{font-size:9px;color:var(--t3);margin-top:3px;font-weight:600}
.pg{height:7px;background:var(--bg2);border-radius:4px;overflow:hidden}.pgf{height:100%;border-radius:4px;transition:width .5s}
.alc{background:var(--card);border:1px solid rgba(194,59,34,.15);border-radius:var(--r);padding:20px 22px;border-left:4px solid var(--red);box-shadow:var(--sh)}
.upc{background:var(--card);border:1px solid var(--blt);border-radius:12px;padding:14px 20px;border-left:4px solid var(--accent);display:flex;justify-content:space-between;align-items:center;box-shadow:var(--sh)}
.rc{background:var(--card);border:1px solid var(--blt);border-radius:var(--rs);padding:16px 20px;box-shadow:var(--sh)}
.ic2{background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:16px 22px;flex:1 1 200px}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.25);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;opacity:0;pointer-events:none;transition:opacity .2s}.mo.op{opacity:1;pointer-events:auto}.ml{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:var(--shl);transform:translateY(8px);transition:transform .2s}.mo.op .ml{transform:translateY(0)}.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}.mh h3{font-size:19px;font-weight:800}.mc{background:none;border:none;color:var(--t3);cursor:pointer;padding:4px;border-radius:6px}.mc:hover{background:var(--bg2)}
.fd{margin-bottom:14px}.fd label{display:block;font-size:12px;color:var(--t3);font-weight:600;margin-bottom:5px}.fd input,.fd select{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;font-family:var(--f);font-size:14px;color:var(--t);outline:none}.fd input:focus,.fd select:focus{border-color:var(--accent)}.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cp{background:var(--bg);border-radius:10px;padding:14px;margin-bottom:14px;font-size:13px}.cr2{display:flex;justify-content:space-between;margin-bottom:4px}.ma{display:flex;gap:10px;justify-content:flex-end;margin-top:6px}
.warn{background:#FEF3C7;border:1px solid #F59E0B;border-radius:10px;padding:12px 16px;margin-bottom:14px;font-size:13px;color:#92400E;display:flex;align-items:flex-start;gap:8px}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;flex-direction:column;gap:16px}.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;right:24px;padding:14px 22px;border-radius:12px;font-size:14px;font-weight:600;color:#fff;z-index:2000;transform:translateY(80px);opacity:0;transition:all .3s;box-shadow:var(--shl);font-family:var(--f)}.toast.show{transform:translateY(0);opacity:1}.tok{background:var(--green)}.ter{background:var(--red)}.twa{background:var(--accent)}
.cscore{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:50%;font-size:14px;font-weight:800;border:3px solid}
.expb{height:8px;background:var(--bg2);border-radius:4px;overflow:hidden;margin-top:6px}.expf{height:100%;border-radius:4px;transition:width .4s}
.es{text-align:center;padding:48px 20px}
@media(max-width:640px){.hdr{padding:0 14px}main{padding:16px}.nb span{display:none}.nb{padding:10px}.ph h1{font-size:22px}.sc .vl{font-size:22px}}
</style>
</head>
<body>
<div id="app">
<header class="hdr">
<div class="logo"><div class="lm">TC</div><div><div class="lt2">Loan Manager</div><div class="ls">Family Fund</div></div></div>
<nav id="mainNav"></nav>
<button class="odb" id="odBtn" onclick="goPage('alerts')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span id="odCnt"></span></button>
</header>
<main><div id="pg-dashboard"></div><div id="pg-loans" style="display:none"></div><div id="pg-contributions" style="display:none"></div><div id="pg-alerts" style="display:none"></div><div id="pg-insights" style="display:none"></div><div id="pg-settings" style="display:none"></div></main>
</div>
<div class="mo" id="mOv"><div class="ml" id="mCt"></div></div>
<div class="toast" id="toast"></div>
<script>
// API URL persisted in browser — enter once, works forever
let API_URL='';try{API_URL=localStorage.getItem('tc_api_url')||''}catch(e){}
function saveApiUrl(u){API_URL=u;try{localStorage.setItem('tc_api_url',u)}catch(e){}}
let loans=[],contributions=[],investments=[],settings={},creditScores={},currentPage='dashboard',searchTerm='',statusFilter='ALL',dataLoaded=false;
const fmt=n=>n==null||isNaN(n)?'—':new Intl.NumberFormat('en-TZ').format(Math.round(n));
const fmtS=n=>n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(0)+'K':fmt(n);
const today=new Date();today.setHours(0,0,0,0);
const isOD=l=>l.status&&l.status.toUpperCase().trim()!=='PAID'&&l.dueDate&&new Date(l.dueDate)<today;
const dOD=l=>isOD(l)?Math.floor((today-new Date(l.dueDate))/864e5):0;
const esc=s=>String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const I={dash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>',loan:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>',ppl:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4-4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>',alt:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',bulb:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18h6M10 22h4M12 2a7 7 0 00-4 12.7V17h8v-2.3A7 7 0 0012 2z"/></svg>',gear:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>',plus:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',edit:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',trash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>',chk:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>',x:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',srch:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>',pls:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>',mail:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12a2 2 0 01-2 2H4a2 2 0 01-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>',shield:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',file:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'};

function donut(segs,sz=130,sw=15){const r=(sz-sw)/2,c=2*Math.PI*r,tot=segs.reduce((s,g)=>s+g.v,0);let off=0,a='';segs.filter(s=>s.v>0).forEach(s=>{const p=s.v/(tot||1),d=p*c;a+=`<circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${s.c}" stroke-width="${sw}" stroke-dasharray="${d} ${c-d}" stroke-dashoffset="${-off}" stroke-linecap="round" transform="rotate(-90 ${sz/2} ${sz/2})"/>`;off+=d});return`<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}"><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="var(--border)" stroke-width="${sw}"/>${a}<text x="${sz/2}" y="${sz/2-5}" text-anchor="middle" fill="var(--t)" style="font-size:19px;font-weight:800;font-family:var(--f)">${fmtS(tot)}</text><text x="${sz/2}" y="${sz/2+13}" text-anchor="middle" fill="var(--t3)" style="font-size:10px;font-weight:600">TSH</text></svg>`}
function toast(m,t='ok'){const e=document.getElementById('toast');e.className='toast t'+t+' show';e.textContent=m;setTimeout(()=>e.classList.remove('show'),3500)}

async function api(action,params={},postData=null){
  if(!API_URL){toast('Set API_URL first','er');return null}
  // CORS fix: send ALL requests as GET with data encoded in URL params
  // Google Apps Script redirects POST requests which causes CORS failures
  let url=API_URL+'?action='+action;
  Object.keys(params).forEach(k=>{url+='&'+k+'='+encodeURIComponent(params[k])});
  if(postData) url+='&data='+encodeURIComponent(JSON.stringify(postData));
  try{
    const r=await fetch(url,{method:'GET',redirect:'follow'});
    const d=await r.json();
    if(d.error){toast(d.error,'er');return null}
    return d;
  }catch(e){
    toast('Connection failed — check URL & deployment','er');
    console.error('API error:',e);
    return null;
  }
}
async function loadAll(){
  const el=document.getElementById('pg-'+currentPage);
  el.innerHTML='<div class="loading"><div class="spinner"></div><span style="color:var(--t3)">Loading data...</span></div>';
  if(!API_URL){el.innerHTML='<div class="es"><div style="font-size:44px;margin-bottom:12px">🔗</div><h3>Connect to Google Sheets</h3><p style="color:var(--t3);max-width:440px;margin:8px auto 20px;line-height:1.6">Go to <b>Settings</b> to paste your Apps Script URL. You only need to do this once — it saves automatically.</p><button class="btn bp" onclick="goPage(\'settings\')">Go to Settings</button></div>';return}
  const d=await api('readAll');if(d){loans=d.loans||[];contributions=d.contributions||[];investments=d.investments||[];settings=d.settings||{};creditScores=d.creditScores||{};dataLoaded=true;renderAll()}
}

function getStats(){const op=loans.filter(l=>(l.status||'').toUpperCase().trim()!=='PAID'),pd=loans.filter(l=>(l.status||'').toUpperCase().trim()==='PAID');return{tL:loans.reduce((s,l)=>s+(+l.amount||0),0),tO:op.reduce((s,l)=>s+(+l.remaining||0),0),tR:loans.reduce((s,l)=>s+(+l.amountPaid||0),0),tI:pd.reduce((s,l)=>s+(+l.interest||0),0),od:op.filter(isOD),odA:op.filter(isOD).reduce((s,l)=>s+(+l.remaining||0),0),tC:contributions.reduce((s,c)=>s+(+c.total||0),0),iT:investments.reduce((s,i)=>s+(+i.amount||0),0),rR:(()=>{const t=loans.reduce((s,l)=>s+(+l.sumToPay||0),0);return t>0?loans.reduce((s,l)=>s+(+l.amountPaid||0),0)/t*100:0})(),oC:op.length,pC:pd.length}}
function getBStats(){const m={};loans.forEach(l=>{const b=l.borrower;if(!b)return;if(!m[b])m[b]={n:b,tB:0,tO:0,tP:0,cnt:0,odC:0};m[b].tB+=(+l.amount||0);m[b].tO+=(+l.remaining||0);m[b].tP+=(+l.amountPaid||0);m[b].cnt++;if(isOD(l))m[b].odC++});return Object.values(m).sort((a,b)=>b.tO-a.tO)}

const pages=[{id:'dashboard',l:'Dashboard',i:I.dash},{id:'loans',l:'Loans',i:I.loan},{id:'contributions',l:'Contributions',i:I.ppl},{id:'alerts',l:'Alerts',i:I.alt},{id:'insights',l:'Insights',i:I.bulb},{id:'settings',l:'Settings',i:I.gear}];
function renderNav(){document.getElementById('mainNav').innerHTML=pages.map(p=>`<button class="nb ${currentPage===p.id?'a':''}" onclick="goPage('${p.id}')">${p.i}<span>${p.l}</span></button>`).join('');const s=getStats(),ob=document.getElementById('odBtn');if(s.od.length>0){ob.style.display='flex';document.getElementById('odCnt').textContent=s.od.length+' Overdue'}else ob.style.display='none'}
function goPage(id){currentPage=id;pages.forEach(p=>{const e=document.getElementById('pg-'+p.id);if(e)e.style.display=p.id===id?'block':'none'});renderNav();if(!dataLoaded&&id!=='settings')loadAll();else renderPage()}

lue)'},{l:'Contributions',v:s.tC,c:'var(--purple)'}].map(x=>`<div class="dlr"><span class="dll"><span class="dld" style="background:${x.c}"></span>${x.l}</span><span class="dlv">${fmtS(x.v)}</span></div>`).join('')}</div></div></div></div><div class="cd" style="padding:22px"><div class="ct">Monthly Contributions</div><div class="mb">${contributions.map(ct=>{const h=Math.max(2,((+ct.total||0)/400000)*42);return`<div class="mbc"><div class="mbb" style="height:${h}px;background:${ct.total>0?'var(--green)':'var(--border)'};opacity:${ct.total>0?1:.3}"></div><div class="mbl">${(ct.month||'').split(' ')[0].slice(0,3)}</div></div>`}).join('')}</div></div>`}

><td><span class="bg ${od?'bgod':st==='PAID'?'bgp':'bgo'}">${od?'OVERDUE':st||'OPEN'}</span></td><td>${cs?`<span class="cscore" style="border-color:${gc};color:${gc}">${cs.grade}</span>`:'—'}</td><td><div style="display:flex;gap:4px">${st!=='PAID'?`<button class="ab ap" onclick="openPayModal('${l.id}')">${I.chk}</button>`:''}<button class="ab ae" onclick="openEditLoan('${l.id}')">${I.edit}</button><button class="ab adl" onclick="confirmDel('${l.id}')">${I.trash}</button></div></td></tr>`}).join('')}</tbody></table></div><div class="tf"><span>${fl.length} loans</span><span>Outstanding: <b style="color:var(--accent)">${fmt(fl.reduce((s,l)=>s+(+l.remaining||0),0))} TSH</b></span></div></div>`}

${c.status==='PAID'?'bgp':'bgpe'}">${c.status||'PENDING'}</span></td><td><button class="ab ae" onclick="openEditContrib('${c.id}')">${I.edit}</button></td></tr>`).join('')}</tbody></table></div>`}

function rInsights(){const bs=getBStats(),maxExp=+(settings.maxExposurePerBorrower||3000000),tI=loans.filter(l=>(l.status||'').toUpperCase().trim()==='PAID').reduce((s,l)=>s+(+l.interest||0),0),tL=loans.reduce((s,l)=>s+(+l.amount||0),0),avgR=loans.length>0?loans.reduce((s,l)=>s+(+l.rate||0),0)/loans.length:10,proj=[];let bal=tL;for(let m=1;m<=12;m++){bal=bal*(1+avgR/100/12)+400000;proj.push({m,b:bal})}
document.getElementById('pg-insights').innerHTML=`<div class="ph"><h1>Insights</h1><p>Credit scores, exposure & growth</p></div><div class="cd" style="padding:22px;margin-bottom:20px"><div class="ct">${I.shield} Credit Scores & Exposure</div><div style="display:flex;flex-direction:column;gap:12px">${bs.map(b=>{const cs=creditScores[b.n],sc=cs?cs.score:50,gr=cs?cs.grade:'?',gc=gr==='A'?'var(--green)':gr==='B'?'var(--blue)':gr==='C'?'var(--accent)':'var(--red)',rr=(b.tP+b.tO)>0?(b.tP/(b.tP+b.tO)*100):0,ep=maxExp>0?(b.tO/maxExp*100):0,ec=ep>100?'var(--red)':ep>75?'var(--accent)':'var(--green)';return`<div class="rc"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px"><div style="display:flex;align-items:center;gap:14px"><span class="cscore" style="border-color:${gc};color:${gc}">${gr}</span><div><span style="font-weight:800;font-size:15px">${esc(b.n)}</span><span style="font-size:12px;color:var(--t3);margin-left:10px">${b.cnt} loans · ${sc}/100</span></div></div><span class="bg bg${gr.toLowerCase()}">${gr==='A'?'EXCELLENT':gr==='B'?'GOOD':gr==='C'?'FAIR':'POOR'}</span></div><div style="display:flex;gap:24px;font-size:12px;color:var(--t2);margin-bottom:10px;flex-wrap:wrap"><span>Borrowed: <b>${fmtS(b.tB)}</b></span><span>Repaid: <b style="color:var(--green)">${fmtS(b.tP)}</b></span><span>Owed: <b style="color:var(--accent)">${fmtS(b.tO)}</b></span></div><div style="display:flex;gap:16px"><div style="flex:1"><div style="font-size:11px;color:var(--t3);margin-bottom:3px">Repayment: ${rr.toFixed(0)}%</div><div class="pg"><div class="pgf" style="width:${rr}%;background:${gc}"></div></div></div><div style="flex:1"><div style="font-size:11px;color:var(--t3);margin-bottom:3px">Exposure: ${fmtS(b.tO)}/${fmtS(maxExp)} ${ep>100?'⚠':''}</div><div class="expb"><div class="expf" style="width:${Math.min(100,ep)}%;background:${ec}"></div></div></div></div></div>`}).join('')}</div></div><div class="cd" style="padding:22px;         {d:true,t:'Partial payment tracking'},
        {d:true,t:'Growth projections'},
      ].map(c=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--blt)"><span style="width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;${c.d?'background:var(--gdim);color:var(--green)':'background:var(--bg2);color:var(--t3)'}">${c.d?'✓':'○'}</span><span style="font-size:13px">${c.t}</span></div>`).join('')}
    </div>`}
async function testConn(){const u=document.getElementById('s_url').value.trim();if(!u){toast('Enter URL','wa');return}toast('Testing...','wa');try{const r=await fetch(u+'?action=ping',{method:'GET',redirect:'follow'});const txt=await r.text();const d=JSON.parse(txt);if(d.error){toast('Error: '+d.error,'er')}else{saveApiUrl(u);toast('Connected & saved! Loading data...','ok');dataLoaded=false;goPage('dashboard')}}catch(e){toast('Failed: '+e.message+' — Set Access to "Anyone" (not "Anyone with Google account")','er');console.error(e)}}
async function saveSettings(){const d={ownerEmail1:document.getElementById('s_e1')?.value||'',ownerEmail2:document.getElementById('s_e2')?.value||'',reminderDaysBefore:document.getElementById('s_rd')?.value||'7,3,1',maxExposurePerBorrower:document.getElementById('s_mx')?.value||'3000000'};const r=await api('updateSettings',{},d);if(r&&r.success){toast('Settings saved!');settings={...settings,...d};renderAll()}}

function openModal(h){document.getElementById('mCt').innerHTML=h;document.getElementById('mOv').classList.add('op')}
function closeModal(){document.getElementById('mOv').classList.remove('op')}
document.getElementById('mOv').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});

function openLoanModal(){openModal(`<div class="mh"><h3>New Loan</h3><button class="mc" onclick="closeModal()">${I.x}</button></div><div class="warn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><div><b>Due date required</b> — enables overdue tracking & email reminders.</div></div><div class="fd"><label>Borrower Name *</label><input id="f_b" placeholder="e.g., Emanuel Chaula" oninput="chkExp()"></div><div class="fd"><label>Borrower Email</label><input id="f_em" type="email" placeholder="For direct reminders"></div><div class="fr"><div class="fd"><label>Loan Date</label><input id="f_ld" type="date" value="${new Date().toISOString().split('T')[0]}"></div><div class="fd"><label>Due Date *</label><input id="f_dd" type="date"></div></div><div class="fr"><div class="fd"><label>Amount (TSH) *</label><input id="f_a" type="number" placeholder="0" oninput="calcP();chkExp()"></div><div class="fd"><label>Rate (%)</label><input id="f_r" type="number" value="10" oninput="calcP()"></div></div><div class="fd"><label>Already Paid</label><input id="f_p" type="number" value="0"></div><div class="fd"><label>Notes</label><input id="f_n" placeholder="Optional..."></div><div id="expW"></div><div class="cp" id="cP"></div><div class="ma"><button class="btn bgh" onclick="closeModal()">Cancel</button><button class="btn bp" onclick="saveLoan()">Create Loan</button></div>`);calcP()}

function openEditLoan(id){const l=loans.find(x=>String(x.id)===String(id));if(!l)return;openModal(`<div class="mh"><h3>Edit Loan</h3><button class="mc" onclick="closeModal()">${I.x}</button></div><input type="hidden" id="f_eid" value="${l.id}"><div class="fd"><label>Borrower</label><input id="f_b" value="${esc(l.borrower)}"></div><div class="fd"><label>Email</label><input id="f_em" type="email" value="${esc(l.email||'')}"></div><div class="fr"><div class="fd"><label>Loan Date</label><input id="f_ld" type="date" value="${l.loanDate||''}"></div><div class="fd"><label>Due Date</label><input id="f_dd" type="date" value="${l.dueDate||''}"></div></div><div class="fr"><div class="fd"><label>Amount</label><input id="f_a" type="number" value="${l.amount}" oninput="calcP()"></div><div class="fd"><label>Rate (%)</label><input id="f_r" type="number" value="${l.rate}" oninput="calcP()"></div></div><div class="fd"><label>Paid</label><input id="f_p" type="number" value="${l.amountPaid}"></div><div class="fd"><label>Status</label><select id="f_st"><option ${(l.status||'').toUpperCase().trim()==='OPEN'?'selected':''}>OPEN</option><option ${(l.status||'').toUpperCase().trim()==='PAID'?'selected':''}>PAID</option></select></div><div class="fd"><label>Notes</label><input id="f_n" value="${esc(l.notes||'')}"></div><div class="cp" id="cP"></div><div class="ma"><button class="btn bgh" onclick="closeModal()">Cancel</button><button class="btn bp" onclick="saveLoan(true)">Update</button></div>`);calcP()}

function calcP(){const a=+(document.getElementById('f_a')?.value)||0,r=+(document.getElementById('f_r')?.value)||0,el=document.getElementById('cP');if(el)el.innerHTML=`<div class="cr2"><span style="color:var(--t3)">Interest:</span><span style="color:var(--accent);font-weight:600">${fmt(a*r/100)} TSH</span></div><div class="cr2"><span style="color:var(--t3)">Total:</span><span style="font-weight:700">${fmt(a*(1+r/100))} TSH</span></div>`}
function chkExp(){const b=(document.getElementById('f_b')?.value||'').trim(),a=+(document.getElementById('f_a')?.value)||0,mx=+(settings.maxExposurePerBorrower||3000000),el=document.getElementById('expW');if(!el||!b||!a){if(el)el.innerHTML='';return}let cur=0;loans.forEach(l=>{if(l.borrower===b&&(l.status||'').toUpperCase().trim()!=='PAID')cur+=(+l.remaining||0)});const nt=cur+a;el.innerHTML=nt>mx?`<div class="warn" style="background:#FEF2F2;border-color:var(--red);color:#7F1D1D"><b>Exposure limit exceeded!</b> ${esc(b)}: ${fmt(nt)} TSH (limit: ${fmt(mx)})</div>`:nt/mx>.6?`<div class="warn">Exposure at ${(nt/mx*100).toFixed(0)}% for ${esc(b)}</div>`:''}

async function saveLoan(isEdit){const b=document.getElementById('f_b').value.trim();if(!b){toast('Enter name','wa');return}const dd=document.getElementById('f_dd').value;if(!dd&&!isEdit){toast('Due date required','wa');return}const d={borrower:b,email:document.getElementById('f_em')?.value||'',loanDate:document.getElementById('f_ld').value,dueDate:dd,amount:+(document.getElementById('f_a').value)||0,rate:+(document.getElementById('f_r').value)||0,amountPaid:+(document.getElementById('f_p').value)||0,notes:document.getElementById('f_n').value,status:document.getElementById('f_st')?.value||'OPEN'};if(isEdit){d.id=document.getElementById('f_eid').value;const r=await api('update',{sheet:'Loans'},d);if(r?.success){toast('Updated');closeModal();await loadAll()}}else{const r=await api('create',{sheet:'Loans'},d);if(r?.success){toast('Created — agreement emailed');closeModal();await loadAll()}}}

function openPayModal(id){const l=loans.find(x=>String(x.id)===String(id));if(!l)return;openModal(`<div class="mh"><h3>Record Payment</h3><button class="mc" onclick="closeModal()">${I.x}</button></div><input type="hidden" id="f_pid" value="${l.id}"><div class="cp"><p style="font-weight:700;font-size:15px;margin-bottom:10px">${esc(l.borrower)}</p><div class="cr2"><span style="color:var(--t3)">Owed:</span><span style="font-weight:600">${fmt(l.sumToPay)} TSH</span></div><div class="cr2"><span style="color:var(--t3)">Paid:</span><span style="color:var(--green);font-weight:600">${fmt(l.amountPaid)} TSH</span></div><div class="cr2"><span style="color:var(--t3)">Remaining:</span><span style="color:var(--accent);font-weight:700">${fmt(l.remaining)} TSH</span></div></div><div class="fd"><label>Payment Amount (TSH)</label><input id="f_pa" type="number" placeholder="Enter amount..."></div><div class="ma"><button class="btn bgh bsm" onclick="document.getElementById('f_pa').value='${l.remaining}'">Pay Full</button><button class="btn bs" onclick="recPay()">${I.chk} Record</button></div>`)}
async function recPay(){const id=document.getElementById('f_pid').value,a=+(document.getElementById('f_pa').value)||0;if(a<=0){toast('Enter amount','wa');return}const r=await api('recordPayment',{},{id,amount:a});if(r?.success){toast(r.status==='PAID'?'FULLY PAID!':'Recorded');closeModal();await loadAll()}}

function confirmDel(id){const l=loans.find(x=>String(x.id)===String(id));if(!l)return;openModal(`<div class="mh"><h3>Delete Loan</h3><button class="mc" onclick="closeModal()">${I.x}</button></div><p style="color:var(--t2);font-size:14px;margin-bottom:20px">Delete <b>${esc(l.borrower)}</b>'s loan of <b>${fmt(l.amount)} TSH</b>?</p><div class="ma"><button class="btn bgh" onclick="closeModal()">Cancel</button><button class="btn bd" onclick="delLoan('${id}')">${I.trash} Delete</button></div>`)}
async function delLoan(id){const r=await api('delete',{sheet:'Loans',id});if(r?.success){toast('Deleted');closeModal();await loadAll()}}

function openContribModal(){openModal(`<div class="mh"><h3>Add Contribution</h3><button class="mc" onclick="closeModal()">${I.x}</button></div><div class="fd"><label>Month</label><input id="f_cM" placeholder="e.g., April 2026"></div><div class="fr"><div class="fd"><label>Redempter</label><input id="f_cR" type="number" value="220796"></div><div class="fd"><label>TC</label><input id="f_cT" type="number" value="179204"></div></div><div class="fd"><label>Date</label><input id="f_cD" type="date"></div><div class="fd"><label>Txn ID</label><input id="f_cTx" placeholder="CRDB ref"></div><div class="ma"><button class="btn bgh" onclick="closeModal()">Cancel</button><button class="btn bp" onclick="saveC()">Add</button></div>`)}
function openEditContrib(id){const c=contributions.find(x=>String(x.id)===String(id));if(!c)return;openModal(`<div class="mh"><h3>Edit Contribution</h3><button class="mc" onclick="closeModal()">${I.x}</button></div><input type="hidden" id="f_cE" value="${c.id}"><div class="fd"><label>Month</label><input id="f_cM" value="${esc(c.month)}"></div><div class="fr"><div class="fd"><label>Redempter</label><input id="f_cR" type="number" value="${c.redempter}"></div><div class="fd"><label>TC</label><input id="f_cT" type="number" value="${c.tc}"></div></div><div class="fd"><label>Date</label><input id="f_cD" type="date" value="${c.date||''}"></div><div class="fd"><label>Txn ID</label><input id="f_cTx" value="${esc(c.txnId||'')}"></div><div class="fd"><label>Status</label><select id="f_cS"><option ${c.status==='PAID'?'selected':''}>PAID</option><option ${c.status==='PENDING'?'selected':''}>PENDING</option></select></div><div class="ma"><button class="btn bgh" onclick="closeModal()">Cancel</button><button class="btn bp" onclick="saveC(true)">Update</button></div>`)}
async function saveC(isEdit){const d={month:document.getElementById('f_cM').value,redempter:+(document.getElementById('f_cR').value)||0,tc:+(document.getElementById('f_cT').value)||0,date:document.getElementById('f_cD').value,txnId:document.getElementById('f_cTx').value,status:document.getElementById('f_cS')?.value||'PAID'};if(isEdit){d.id=document.getElementById('f_cE').value;const r=await api('update',{sheet:'Contributions'},d);if(r?.success){toast('Updated');closeModal();await loadAll()}}else{const r=await api('create',{sheet:'Contributions'},d);if(r?.success){toast('Added');closeModal();await loadAll()}}}

goPage('dashboard');
</script>
</body>
</html>
